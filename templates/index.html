<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字解謎大挑戰</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <video autoplay muted loop id="bg-video">
        <source src="/static/video/bgv-start.mp4" type="video/mp4">
    </video>

    <div id="main-menu" class="center-content">
        <h1>單字解謎大挑戰</h1>
        <div id="start-box" class="game-box" onclick="startGame()">
            <img src="/static/image/start_game.png" alt="start" class="box-img">
            <p>開始遊戲</p>
        </div>
    </div>

    <div id="mode-menu" class="center-content hidden">
        <div class="mode-box fade-in" onclick="showLevelSelect('easy')">
            <img src="/static/image/easy_mode.png" alt="easy mode">
            <p>簡單模式</p>
        </div>
        <div class="mode-box fade-in" onclick="showLevelSelect('hard')">
            <img src="/static/image/hard_mode.png" alt="hard mode">
            <p>困難模式</p>
        </div>
    </div>

    <div id="level-menu" class="center-content hidden">
        <div class="level-container">
            <div id="total-stars-box">
                <span id="star-icon">★</span>
                <span id="star-count">0 / 84</span>
            </div>

            <h2 id="level-title" style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px;">選擇關卡</h2>
            
            <div class="level-grid" id="level-grid-items"></div>

            <div class="menu-buttons">
                <button onclick="backToMode()" class="back-btn-alt">返回模式選擇</button>
                <button onclick="confirmReset()" class="reset-btn">刪除遊戲紀錄</button>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <p>⚠️ 若點擊確認，遊戲紀錄將無法找回</p>
            <div class="modal-buttons">
                <button id="confirm-reset-btn" class="modal-btn confirm">確認</button>
                <button onclick="closeResetModal()" class="modal-btn cancel">取消</button>
            </div>
        </div>
    </div>

    <audio src="/static/audio/bgm-start.mp3" id="bgm" loop></audio>

    <script>
        // 關鍵：新增一個全域變數來記住現在是哪種模式
        let currentSelectedMode = '';

        function startGame() {
            document.getElementById('bgm').play();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('mode-menu').classList.remove('hidden');
            document.querySelectorAll('.mode-box').forEach((box, index) => {
                setTimeout(() => { box.classList.add('show'); }, index * 300);
            });
        }

        // 當點擊 簡單/困難 模式時觸發
        function showLevelSelect(mode) {
            currentSelectedMode = mode; // 記住現在選的是哪一個
            document.getElementById('mode-menu').classList.add('hidden');
            document.getElementById('level-menu').classList.remove('hidden');
            
            // 執行渲染邏輯
            renderLevels();
        }

        // 獨立出的渲染邏輯：負責畫出星星與關卡按鈕
        function renderLevels() {
            const mode = currentSelectedMode;
            const grid = document.getElementById('level-grid-items');
            grid.innerHTML = ''; 

            // 1. 讀取關卡解鎖進度
            let progressData = JSON.parse(localStorage.getItem('gameProgress')) || { "easy": 1, "hard": 1 };
            const unlockedLevel = progressData[mode] || 1;

            // 2. 讀取並計算星星總數
            let starRecords = JSON.parse(localStorage.getItem('starRecords')) || { "easy": {}, "hard": {} };
            let totalStars = 0;
            
            for (let i = 1; i <= 12; i++) {
                if (starRecords[mode] && starRecords[mode][i]) {
                    totalStars += starRecords[mode][i];
                }
            }
            
            // 更新星星顯示
            document.getElementById('star-count').innerText = `${totalStars} / 84`;

            // 3. 畫出 1~12 關按鈕
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('a');
                btn.className = 'level-btn';
                if (mode === 'hard') btn.classList.add('hard');

                if (i <= unlockedLevel) {
                    btn.href = `/${mode}?level=${i}`;
                    btn.innerText = i;
                    
                    const currentLevelStars = (starRecords[mode] && starRecords[mode][i]) ? starRecords[mode][i] : 0;
                    if(currentLevelStars > 0) {
                        const s = document.createElement('div');
                        s.style.fontSize = '12px';
                        s.innerText = `★${currentLevelStars}`;
                        btn.appendChild(s);
                    }
                } else {
                    btn.classList.add('locked');
                    btn.href = "javascript:void(0)"; 
                    const lockImg = document.createElement('img');
                    lockImg.src = '/static/image/lock.png';
                    lockImg.className = 'lock-icon';
                    btn.appendChild(lockImg);
                }
                grid.appendChild(btn);
            }
        }

        // --- 重置紀錄邏輯 ---
        function confirmReset() {
            document.getElementById('reset-modal').classList.remove('hidden');
            // 當點擊確認視窗裡的「確認」按鈕
            document.getElementById('confirm-reset-btn').onclick = function() {
                performReset();
            };
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.add('hidden');
        }

        function performReset() {
            const mode = currentSelectedMode;

            // 1. 重置該模式關卡進度回 1
            let progressData = JSON.parse(localStorage.getItem('gameProgress')) || { "easy": 1, "hard": 1 };
            progressData[mode] = 1;
            localStorage.setItem('gameProgress', JSON.stringify(progressData));

            // 2. 清空該模式星星紀錄
            let starRecords = JSON.parse(localStorage.getItem('starRecords')) || { "easy": {}, "hard": {} };
            starRecords[mode] = {};
            localStorage.setItem('starRecords', JSON.stringify(starRecords));

            // 3. 關閉視窗並重新「重畫」畫面，讓玩家看到鎖頭回來了
            closeResetModal();
            renderLevels();
            console.log(`${mode} 模式紀錄已成功清除`);
        }

        function backToMode() {
            document.getElementById('level-menu').classList.add('hidden');
            document.getElementById('mode-menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
